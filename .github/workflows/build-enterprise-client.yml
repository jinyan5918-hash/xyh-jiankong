# 在微软云端 Windows 上自动打包客户端，无需本机 Windows。
# 使用：GitHub 仓库 → Actions → Build Enterprise Windows Client → Run workflow → 填写服务器地址 → 下载 Artifacts
#
# 注意：client/release_version.txt、client/更新日志.txt 必须已提交到仓库，否则本工作流会失败。

name: Build Enterprise Windows Client

on:
  workflow_dispatch:
    inputs:
      api_base:
        description: "服务端地址（与浏览器打开后台时一致，不要带 /admin）"
        required: true
        default: "http://127.0.0.1:8000"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r client/requirements-client.txt pyinstaller

      # 用同一段 PowerShell 读版本并打包，避免 GITHUB_ENV 的 CLIENT_VER 在 ${{ env.* }} 里取不到的问题
      - name: PyInstaller + config + copy files
        id: pack
        shell: pwsh
        env:
          API_BASE: ${{ github.event.inputs.api_base }}
        run: |
          if (-not (Test-Path "client/release_version.txt")) {
            throw "缺少 client/release_version.txt。请在本机执行: git add client/release_version.txt 并 push 后再打包。"
          }
          if (-not (Test-Path "client/更新日志.txt")) {
            throw "缺少 client/更新日志.txt。每次发版须维护该文件（更新日期、版本号、更新内容、使用说明）并提交后再打包。"
          }
          $ver = (Get-Content -Path "client/release_version.txt" -TotalCount 1).Trim()
          if ([string]::IsNullOrWhiteSpace($ver)) {
            throw "client/release_version.txt 为空，请写入版本号（如 1.2.0）后提交。"
          }
          Write-Host "PACK_VERSION=$ver"
          $distName = "EnterpriseDouyinClient-$ver"
          pyinstaller --noconfirm --clean --windowed `
            --name $distName `
            --distpath dist `
            --workpath build/pyi_enterprise_client `
            --collect-all plyer `
            --add-data "client/release_version.txt;." `
            client/windows_client.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $dist = Join-Path "dist" $distName
          $env:PACK_DIST_DIR = (Resolve-Path $dist).Path
          python -c "import json,os; from pathlib import Path; d=Path(os.environ['PACK_DIST_DIR']); u=os.environ['API_BASE'].strip().rstrip('/'); (d/'config.json').write_text(json.dumps({'api_base':u},ensure_ascii=False,indent=2)+chr(10),encoding='utf-8')"
          Copy-Item -Force "client\README_employee.txt" $dist
          Copy-Item -Force "client\release_version.txt" $dist
          Copy-Item -Force "client\更新日志.txt" $dist
          $shaFull = $env:GITHUB_SHA
          $shaShort = if ($shaFull.Length -ge 7) { $shaFull.Substring(0, 7) } else { $shaFull }
          $builtAt = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $infoLines = @(
            "client_version=$ver",
            "git_sha=$shaFull",
            "git_sha_short=$shaShort",
            "github_run_id=$env:GITHUB_RUN_ID",
            "github_run_number=$env:GITHUB_RUN_NUMBER",
            "built_at_utc=$builtAt",
            "repository=$env:GITHUB_REPOSITORY"
          )
          $infoLines | Set-Content -Path (Join-Path $dist "build_info.txt") -Encoding utf8
          $artifactName = "EnterpriseDouyinClient-v$ver-$shaShort"
          "dist_subdir=$distName" >> $env:GITHUB_OUTPUT
          "artifact_name=$artifactName" >> $env:GITHUB_OUTPUT
          Write-Host "::notice::本次构建 Artifact 将命名为 $artifactName（与旧包区分：含版本号+提交短 SHA）"
          Write-Host "::notice::解压后请打开 build_info.txt 核对 git_sha 是否与 GitHub 上最新提交一致"

      - name: Upload folder (GitHub 下载时会自动打成 zip)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pack.outputs.artifact_name }}
          path: dist/${{ steps.pack.outputs.dist_subdir }}/
          if-no-files-found: error
